<svg viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Abstract scales mark — gold top blade, silver bottom blade -->

  <!-- Gold top blade (wider trapezoid, slightly lifted) -->
  <polygon points="28,30 92,30 105,38 15,38" fill="url(#goldGrad)"/>
  <!-- Gold blade edge highlight -->
  <line x1="15" y1="38" x2="105" y2="38" stroke="#D4A017" stroke-width="0.5" opacity="0.6"/>
  <!-- Gold horizontal accent lines -->
  <line x1="8" y1="40" x2="112" y2="40" stroke="#C9A84C" stroke-width="0.4" opacity="0.3"/>
  <line x1="10" y1="41.5" x2="110" y2="41.5" stroke="#C9A84C" stroke-width="0.3" opacity="0.2"/>

  <!-- Silver bottom blade (wider trapezoid) -->
  <polygon points="15,44 105,44 92,52 28,52" fill="url(#silverGrad)"/>
  <!-- Silver blade edge highlight -->
  <line x1="15" y1="44" x2="105" y2="44" stroke="#E8E8E8" stroke-width="0.5" opacity="0.4"/>
  <!-- Silver horizontal accent lines -->
  <line x1="10" y1="42.5" x2="110" y2="42.5" stroke="#A0A0A0" stroke-width="0.3" opacity="0.2"/>

  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="35%" stop-color="#D4A017"/>
      <stop offset="65%" stop-color="#E8B930"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0A0A0"/>
      <stop offset="40%" stop-color="#C8C8C8"/>
      <stop offset="70%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#B0B0B0"/>
    </linearGradient>
  </defs>
</svg>
