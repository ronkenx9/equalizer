<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="4" fill="#0D0D1A"/>
  <!-- vertical pole -->
  <rect x="15.5" y="6" width="1" height="19" fill="#C9A84C"/>
  <!-- base -->
  <rect x="11" y="25" width="10" height="1.5" rx="0.75" fill="#C9A84C"/>
  <!-- horizontal beam -->
  <rect x="6" y="9.5" width="20" height="1" rx="0.5" fill="#C9A84C"/>
  <!-- left chain -->
  <line x1="8" y1="10.5" x2="8" y2="16" stroke="#C9A84C" stroke-width="0.8"/>
  <!-- right chain -->
  <line x1="24" y1="10.5" x2="24" y2="14" stroke="#C9A84C" stroke-width="0.8"/>
  <!-- left pan (lower) -->
  <path d="M5 16 Q8 19 11 16" stroke="#C9A84C" stroke-width="1" fill="none"/>
  <!-- right pan (higher) -->
  <path d="M21 14 Q24 17 27 14" stroke="#C9A84C" stroke-width="1" fill="none"/>
</svg>
